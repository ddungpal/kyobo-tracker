name: 교보문고 일간 순위 수집

on:
  schedule:
    # 매일 한국시간 오전 11시 (UTC 02:00) — 오전 집계 반영 시간대
    - cron: "0 2 * * *"
  workflow_dispatch:  # 수동 실행 버튼도 활성화

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # CSV 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests

      - name: 순위 수집
        run: python scraper.py

      - name: CSV 변경사항 커밋 & 푸시
        run: |
          git config user.name  "rank-bot"
          git config user.email "rank-bot@users.noreply.github.com"
          git add rank_history.csv
          # 변경사항 있을 때만 커밋
          git diff --cached --quiet || git commit -m "📊 순위 업데이트: $(date +'%Y-%m-%d')"
          git push
